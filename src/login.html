<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — DistrictOps AI</title>
<link rel="stylesheet" href="../dist/output.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { font-family: 'DM Sans', system-ui, sans-serif; }
  .fade-in { animation: fadeIn 0.4s ease-out; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  input:focus { outline:none; box-shadow:0 0 0 2px rgba(9,103,210,0.25); border-color:#0967D2; }
  .btn-primary { background:#0967D2; color:white; transition:all 0.15s; }
  .btn-primary:hover { background:#03449E; }
  .btn-primary:disabled { background:#bcccdc; cursor:not-allowed; }
  .btn-google { background:white; border:1px solid #d9e2ec; color:#243b53; transition:all 0.15s; }
  .btn-google:hover { background:#f0f4f8; border-color:#bcccdc; }
  .divider { display:flex; align-items:center; gap:12px; color:#829ab1; font-size:0.75rem; text-transform:uppercase; letter-spacing:0.05em; }
  .divider::before, .divider::after { content:''; flex:1; height:1px; background:#d9e2ec; }
  .error-msg { background:#fef2f2; border:1px solid #fecaca; color:#E12D39; border-radius:0.5rem; padding:0.75rem 1rem; font-size:0.875rem; }
  .success-msg { background:#f0fdf4; border:1px solid #bbf7d0; color:#27AB83; border-radius:0.5rem; padding:0.75rem 1rem; font-size:0.875rem; }
  .password-toggle { position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer; color:#829ab1; }
  .password-toggle:hover { color:#486581; }
  .strength-bar { height:3px; border-radius:2px; transition:all 0.3s; }
</style>
</head>
<body class="bg-navy-50 min-h-screen flex items-center justify-center px-4">

<!-- Auth Container -->
<div class="w-full max-w-md fade-in">
  <!-- Logo & Header -->
  <div class="text-center mb-8">
    <div class="w-14 h-14 rounded-xl bg-accent flex items-center justify-center mx-auto mb-4 shadow-sm">
      <svg class="w-7 h-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
    </div>
    <h1 class="text-xl font-semibold text-navy-800">DistrictOps <span class="text-accent">AI</span></h1>
    <p class="text-sm text-navy-500 mt-1">Shadow Mode Platform for Special Districts</p>
  </div>

  <!-- Auth Card -->
  <div class="bg-white rounded-xl border border-navy-100 shadow-sm p-6 sm:p-8">
    <!-- Tab Switcher -->
    <div class="flex mb-6 border-b border-navy-100">
      <button id="tabSignIn" onclick="switchTab('signin')" class="flex-1 pb-3 text-sm font-medium text-accent border-b-2 border-accent transition-colors">Sign In</button>
      <button id="tabSignUp" onclick="switchTab('signup')" class="flex-1 pb-3 text-sm font-medium text-navy-400 border-b-2 border-transparent hover:text-navy-600 transition-colors">Create Account</button>
    </div>

    <!-- Alert Area -->
    <div id="alertArea" class="hidden mb-4"></div>

    <!-- Google Auth Button -->
    <button id="btnGoogle" onclick="signInWithGoogle()" class="btn-google w-full flex items-center justify-center gap-3 px-4 py-3 rounded-lg font-medium text-sm">
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9s.321 1.43.957 2.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      <span id="googleBtnText">Continue with Google</span>
    </button>

    <div class="divider my-5">or</div>

    <!-- Sign In Form -->
    <form id="formSignIn" onsubmit="handleEmailSignIn(event)" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-navy-700 mb-1.5">Email address</label>
        <input type="email" id="siEmail" required autocomplete="email"
          class="w-full px-3.5 py-2.5 rounded-lg border border-navy-200 text-sm text-navy-800 placeholder-navy-300"
          placeholder="you@district.gov">
      </div>
      <div>
        <label class="block text-sm font-medium text-navy-700 mb-1.5">Password</label>
        <div class="relative">
          <input type="password" id="siPassword" required autocomplete="current-password" minlength="8"
            class="w-full px-3.5 py-2.5 rounded-lg border border-navy-200 text-sm text-navy-800 placeholder-navy-300 pr-10"
            placeholder="Enter your password">
          <button type="button" onclick="togglePassword('siPassword', this)" class="password-toggle">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" d="M2.458 12C3.732 7.943 6.523 5 12 5c5.477 0 8.268 2.943 9.542 7-1.274 4.057-4.065 7-9.542 7-5.477 0-8.268-2.943-9.542-7z"/></svg>
          </button>
        </div>
      </div>
      <div class="flex items-center justify-between text-sm">
        <label class="flex items-center gap-2 text-navy-600 cursor-pointer">
          <input type="checkbox" id="siRemember" class="rounded border-navy-300 text-accent focus:ring-accent">
          <span>Remember me</span>
        </label>
        <button type="button" onclick="showResetPassword()" class="text-accent hover:text-accent-dark font-medium">Forgot password?</button>
      </div>
      <button type="submit" id="btnSignIn" class="btn-primary w-full py-2.5 rounded-lg font-medium text-sm">
        Sign In
      </button>
    </form>

    <!-- Sign Up Form (hidden by default) -->
    <form id="formSignUp" onsubmit="handleEmailSignUp(event)" class="space-y-4 hidden">
      <div>
        <label class="block text-sm font-medium text-navy-700 mb-1.5">Full name</label>
        <input type="text" id="suName" required autocomplete="name"
          class="w-full px-3.5 py-2.5 rounded-lg border border-navy-200 text-sm text-navy-800 placeholder-navy-300"
          placeholder="Commissioner Jane Smith">
      </div>
      <div>
        <label class="block text-sm font-medium text-navy-700 mb-1.5">Email address</label>
        <input type="email" id="suEmail" required autocomplete="email"
          class="w-full px-3.5 py-2.5 rounded-lg border border-navy-200 text-sm text-navy-800 placeholder-navy-300"
          placeholder="you@district.gov">
      </div>
      <div>
        <label class="block text-sm font-medium text-navy-700 mb-1.5">Password</label>
        <div class="relative">
          <input type="password" id="suPassword" required autocomplete="new-password" minlength="8"
            oninput="checkPasswordStrength(this.value)"
            class="w-full px-3.5 py-2.5 rounded-lg border border-navy-200 text-sm text-navy-800 placeholder-navy-300 pr-10"
            placeholder="Minimum 8 characters">
          <button type="button" onclick="togglePassword('suPassword', this)" class="password-toggle">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" d="M2.458 12C3.732 7.943 6.523 5 12 5c5.477 0 8.268 2.943 9.542 7-1.274 4.057-4.065 7-9.542 7-5.477 0-8.268-2.943-9.542-7z"/></svg>
          </button>
        </div>
        <div class="mt-1.5 flex gap-1" id="strengthBars">
          <div class="strength-bar flex-1 bg-navy-100"></div>
          <div class="strength-bar flex-1 bg-navy-100"></div>
          <div class="strength-bar flex-1 bg-navy-100"></div>
          <div class="strength-bar flex-1 bg-navy-100"></div>
        </div>
        <p id="strengthText" class="text-xs text-navy-400 mt-1"></p>
      </div>
      <div>
        <label class="block text-sm font-medium text-navy-700 mb-1.5">Confirm password</label>
        <input type="password" id="suPasswordConfirm" required autocomplete="new-password" minlength="8"
          class="w-full px-3.5 py-2.5 rounded-lg border border-navy-200 text-sm text-navy-800 placeholder-navy-300"
          placeholder="Re-enter your password">
      </div>
      <button type="submit" id="btnSignUp" class="btn-primary w-full py-2.5 rounded-lg font-medium text-sm">
        Create Account
      </button>
      <p class="text-xs text-navy-400 text-center">By creating an account, you agree to the <a href="#" class="text-accent hover:underline">Terms of Service</a> and <a href="#" class="text-accent hover:underline">Privacy Policy</a>.</p>
    </form>

    <!-- Reset Password Form (hidden by default) -->
    <form id="formReset" onsubmit="handleResetPassword(event)" class="space-y-4 hidden">
      <p class="text-sm text-navy-600">Enter your email address and we'll send you a link to reset your password.</p>
      <div>
        <label class="block text-sm font-medium text-navy-700 mb-1.5">Email address</label>
        <input type="email" id="resetEmail" required autocomplete="email"
          class="w-full px-3.5 py-2.5 rounded-lg border border-navy-200 text-sm text-navy-800 placeholder-navy-300"
          placeholder="you@district.gov">
      </div>
      <button type="submit" id="btnReset" class="btn-primary w-full py-2.5 rounded-lg font-medium text-sm">
        Send Reset Link
      </button>
      <button type="button" onclick="switchTab('signin')" class="w-full text-sm text-accent hover:text-accent-dark font-medium text-center">
        Back to Sign In
      </button>
    </form>
  </div>

  <!-- Footer -->
  <p class="text-center text-xs text-navy-400 mt-6">Powered by Good Samaritan Institute &middot; Secure authentication via Firebase</p>
</div>

<!-- Firebase SDKs (compat mode for vanilla JS) -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>

<script>
// ============ FIREBASE CONFIG ============
const firebaseConfig = {
  apiKey: "AIzaSyAIBq5l9TLbRxFe0it0k0QnIzcqET5xAlI",
  authDomain: "districtops-ai.firebaseapp.com",
  projectId: "districtops-ai",
  storageBucket: "districtops-ai.firebasestorage.app",
  messagingSenderId: "433345366803",
  appId: "1:433345366803:web:48d51b4c5d726dd6e668e6",
  measurementId: "G-LPS1VYF7DW"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// Persistence
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

// ============ AUTH STATE LISTENER ============
auth.onAuthStateChanged(user => {
  if (user) {
    window.location.href = 'index.html';
  }
});

// ============ TAB SWITCHING ============
function switchTab(tab) {
  hideAlert();
  const tabSI = document.getElementById('tabSignIn');
  const tabSU = document.getElementById('tabSignUp');
  const formSI = document.getElementById('formSignIn');
  const formSU = document.getElementById('formSignUp');
  const formReset = document.getElementById('formReset');
  const googleBtn = document.getElementById('btnGoogle');
  const dividers = document.querySelectorAll('.divider');
  const googleText = document.getElementById('googleBtnText');

  formReset.classList.add('hidden');
  googleBtn.classList.remove('hidden');
  dividers.forEach(d => d.classList.remove('hidden'));

  if (tab === 'signin') {
    tabSI.className = 'flex-1 pb-3 text-sm font-medium text-accent border-b-2 border-accent transition-colors';
    tabSU.className = 'flex-1 pb-3 text-sm font-medium text-navy-400 border-b-2 border-transparent hover:text-navy-600 transition-colors';
    formSI.classList.remove('hidden');
    formSU.classList.add('hidden');
    googleText.textContent = 'Continue with Google';
  } else if (tab === 'signup') {
    tabSU.className = 'flex-1 pb-3 text-sm font-medium text-accent border-b-2 border-accent transition-colors';
    tabSI.className = 'flex-1 pb-3 text-sm font-medium text-navy-400 border-b-2 border-transparent hover:text-navy-600 transition-colors';
    formSU.classList.remove('hidden');
    formSI.classList.add('hidden');
    googleText.textContent = 'Sign up with Google';
  }
}

function showResetPassword() {
  hideAlert();
  document.getElementById('formSignIn').classList.add('hidden');
  document.getElementById('formSignUp').classList.add('hidden');
  document.getElementById('formReset').classList.remove('hidden');
  document.getElementById('btnGoogle').classList.add('hidden');
  document.querySelectorAll('.divider').forEach(d => d.classList.add('hidden'));
  document.getElementById('tabSignIn').className = 'flex-1 pb-3 text-sm font-medium text-navy-400 border-b-2 border-transparent';
  document.getElementById('tabSignUp').className = 'flex-1 pb-3 text-sm font-medium text-navy-400 border-b-2 border-transparent';
}

// ============ ALERT HELPERS ============
function showAlert(msg, type) {
  const area = document.getElementById('alertArea');
  area.className = type === 'error' ? 'error-msg mb-4' : 'success-msg mb-4';
  area.textContent = msg;
  area.classList.remove('hidden');
}

function hideAlert() {
  const area = document.getElementById('alertArea');
  area.classList.add('hidden');
  area.textContent = '';
}

// ============ GOOGLE SIGN IN ============
async function signInWithGoogle() {
  const btn = document.getElementById('btnGoogle');
  btn.disabled = true;
  hideAlert();
  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });
    await auth.signInWithPopup(provider);
  } catch (err) {
    btn.disabled = false;
    if (err.code === 'auth/popup-closed-by-user') return;
    showAlert(friendlyError(err.code), 'error');
  }
}

// ============ EMAIL SIGN IN ============
async function handleEmailSignIn(e) {
  e.preventDefault();
  const btn = document.getElementById('btnSignIn');
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  hideAlert();

  const email = document.getElementById('siEmail').value.trim();
  const password = document.getElementById('siPassword').value;

  try {
    await auth.signInWithEmailAndPassword(email, password);
  } catch (err) {
    btn.disabled = false;
    btn.textContent = 'Sign In';
    showAlert(friendlyError(err.code), 'error');
  }
}

// ============ EMAIL SIGN UP ============
async function handleEmailSignUp(e) {
  e.preventDefault();
  const btn = document.getElementById('btnSignUp');
  btn.disabled = true;
  btn.textContent = 'Creating account...';
  hideAlert();

  const name = document.getElementById('suName').value.trim();
  const email = document.getElementById('suEmail').value.trim();
  const password = document.getElementById('suPassword').value;
  const confirmPw = document.getElementById('suPasswordConfirm').value;

  if (password !== confirmPw) {
    showAlert('Passwords do not match.', 'error');
    btn.disabled = false;
    btn.textContent = 'Create Account';
    return;
  }

  if (password.length < 8) {
    showAlert('Password must be at least 8 characters.', 'error');
    btn.disabled = false;
    btn.textContent = 'Create Account';
    return;
  }

  try {
    const userCredential = await auth.createUserWithEmailAndPassword(email, password);
    await userCredential.user.updateProfile({ displayName: name });
    await userCredential.user.sendEmailVerification();
  } catch (err) {
    btn.disabled = false;
    btn.textContent = 'Create Account';
    showAlert(friendlyError(err.code), 'error');
  }
}

// ============ PASSWORD RESET ============
async function handleResetPassword(e) {
  e.preventDefault();
  const btn = document.getElementById('btnReset');
  btn.disabled = true;
  btn.textContent = 'Sending...';
  hideAlert();

  const email = document.getElementById('resetEmail').value.trim();

  try {
    await auth.sendPasswordResetEmail(email);
    showAlert('Password reset email sent! Check your inbox.', 'success');
    btn.textContent = 'Send Reset Link';
    btn.disabled = false;
  } catch (err) {
    btn.disabled = false;
    btn.textContent = 'Send Reset Link';
    showAlert(friendlyError(err.code), 'error');
  }
}

// ============ PASSWORD STRENGTH ============
function checkPasswordStrength(pw) {
  const bars = document.getElementById('strengthBars').children;
  const text = document.getElementById('strengthText');
  let score = 0;
  if (pw.length >= 8) score++;
  if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
  if (/\d/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;

  const colors = ['#E12D39', '#E8A317', '#47A3F3', '#27AB83'];
  const labels = ['Weak', 'Fair', 'Good', 'Strong'];

  for (let i = 0; i < 4; i++) {
    bars[i].style.background = i < score ? colors[score - 1] : '#d9e2ec';
  }
  text.textContent = pw.length > 0 ? labels[score - 1] || '' : '';
  text.style.color = pw.length > 0 ? colors[score - 1] : '#829ab1';
}

// ============ TOGGLE PASSWORD VISIBILITY ============
function togglePassword(inputId, btn) {
  const input = document.getElementById(inputId);
  if (input.type === 'password') {
    input.type = 'text';
    btn.innerHTML = '<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-5.477 0-8.268-2.943-9.542-7a9.97 9.97 0 012.31-3.738M6.938 6.938A9.016 9.016 0 0112 5c5.477 0 8.268 2.943 9.542 7a9.958 9.958 0 01-4.043 5.062M6.938 6.938L3 3m3.938 3.938l3.124 3.124m6.876 6.876L21 21m-3.938-3.938l-3.124-3.124m0 0a3 3 0 10-4.243-4.243m4.243 4.243L9.88 9.88"/></svg>';
  } else {
    input.type = 'password';
    btn.innerHTML = '<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" d="M2.458 12C3.732 7.943 6.523 5 12 5c5.477 0 8.268 2.943 9.542 7-1.274 4.057-4.065 7-9.542 7-5.477 0-8.268-2.943-9.542-7z"/></svg>';
  }
}

// ============ FRIENDLY ERROR MESSAGES ============
function friendlyError(code) {
  const map = {
    'auth/invalid-email': 'Please enter a valid email address.',
    'auth/user-disabled': 'This account has been disabled. Contact your administrator.',
    'auth/user-not-found': 'No account found with this email. Please create an account.',
    'auth/wrong-password': 'Incorrect password. Please try again or reset your password.',
    'auth/invalid-credential': 'Invalid email or password. Please check your credentials.',
    'auth/email-already-in-use': 'An account with this email already exists. Try signing in.',
    'auth/weak-password': 'Password is too weak. Use at least 8 characters with mixed types.',
    'auth/too-many-requests': 'Too many attempts. Please wait a moment and try again.',
    'auth/network-request-failed': 'Network error. Check your internet connection.',
    'auth/popup-blocked': 'Popup was blocked by your browser. Please allow popups for this site.',
    'auth/operation-not-allowed': 'This sign-in method is not enabled. Contact your administrator.',
  };
  return map[code] || 'Something went wrong. Please try again.';
}
</script>
</body>
</html>
